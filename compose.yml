services:
  mongo:
    image: mongo:8.0
    container_name: binaried-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: binaried
      # Required by MongoDB's TCMalloc on Linux kernel 6.19+.
      GLIBC_TUNABLES: glibc.pthread.rseq=1
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo-data:
